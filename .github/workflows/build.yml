name: Gradle Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down the code from your repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Java 21 (Required for 1.20.1 Architectury/Forge/Fabric)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 3. Give the system permission to run the Gradle wrapper script
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Run the Gradle build command to generate the mod jars
    - name: Build with Gradle
      run: ./gradlew build

    # 5. Save the compiled jars so you can download them directly from your browser
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Mod-Jars
        path: |
          fabric/build/libs/*.jar
          forge/build/libs/*.jar
          common/build/libs/*.jar
